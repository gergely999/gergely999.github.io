<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">
    </head>

<body>

    <div class="container">
        <div class="row">
            <div class="col-3"></div>
            <div class="col-6">
                <h3>Hamburger rendelés</h3>
                <div class="alert alert-warning alert-dismissible fade show" role="alert">
                    <strong>Kedves Vásárónk!</strong>
                     A rendeléshez kérjük töltse ki az űrlapot.
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <form id="orderForm" action="">
                    <div class="form-group">
                        <label for="">Feltét</label>
                        <input id="topInput" title="lol" placeholder="sajt" type="text" name="top-input"
                            class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="">Mennyiség</label>
                        <input type="number" name="amount-input" class="form-control" value="1">
                        <small class="form-text text-muted">
                            Minimum 1, maximum 10db.
                        </small>
                    </div>
                    <div class="form-group">
                        Fizetendő:
                        <span class="show-amount" value=>0</span> Ft
                    </div>
                    +
                    <div class="form-group">
                        Szállítási díj:
                        <span class="show-deliveryprice">500</span> Ft
                    </div>
                    <br>
                    <div class="form-group">
                        Összesen:
                        <span class="show-total">0</span> Ft
                    </div>
                    <button id="submitBtn" type="button" class="btn btn-primary">Megrendelés</button>
                    <footer>
                        <small id="deliveryFee" class="form-text text-muted">Házhozszállítás: 5000Ft felett ingyenes,
                            ehhez még <span class="show-leftprice">0</span>Ft rendelés szükséges.
                        </small>
                        <br>
                        <small id="deliveryFeeFree" class="form-text text-muted">
                            Önnek már Ingyenes a szállítás! :)
                        </small>
                    </footer>
                </form>
            </div>
            <div class="col-3"></div>

        </div>
    </div>

    <script src="js/main"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-Piv4xVNRyMGpqkS2by6br4gNJ7DXjqk09RmUpJ8jgGtD7zP9yug3goQfGII0yAns" crossorigin="anonymous"></script>


</body>

</html>
