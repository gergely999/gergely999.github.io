<!DOCTYPE html>
<html lang="en">
<head>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css\bootstrap\bootstrap.min.css">
    </head>
</head>
<body>

    <div class="container">
        <div class="row">
            <div class="col-3"></div>
            <div class="col-6">
                <h3>Hamburger rendelés</h3>
                <form action="">
                    <div class="form-group">
                        <label for="">Feltét</label>
                        <input type="text" name="top-input" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="">Mennyiség</label>
                        <input type="number" name="amount-input" class="form-control" value="1">
                        <small class="form-text text-muted">
                            Minimum 1, maximum 10db.
                        </small>
                    </div>
                    <div class="form-group">
                        Fizetendő:
                        <span class="show-amount" value=>0</span> Ft
                    </div>
                    <button onclick="calculate()" type="button" class="btn btn-primary">Megrendelés</button>
                </form>
            </div>
            <div class="col-3"></div>

        </div>
    </div>

    <script src="js/main.js"></script>
    
</body>
</html>
